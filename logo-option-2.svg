<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="tealGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#006464"/>
    </linearGradient>
    <linearGradient id="tealFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006464" stop-opacity="1"/>
      <stop offset="100%" stop-color="#006464" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════
       ICON: Two interlocking rhombuses suggesting
       M&A — two entities converging into one.
       The left shape = target/acquisition
       The right shape = acquirer
       The overlap = the deal
       ══════════════════════════════════════════ -->

  <!-- Left diamond (target company) — teal solid -->
  <polygon
    points="56,80  80,44  104,80  80,116"
    fill="url(#tealGrad2)"
    opacity="0.9"
  />

  <!-- Right diamond (acquirer) — dark outline / overlap -->
  <polygon
    points="80,80  104,44  128,80  104,116"
    fill="#0A0A0A"
    opacity="0.88"
  />

  <!-- Overlap region — bright teal accent showing deal closure -->
  <polygon
    points="80,80  104,44  104,80  104,116"
    fill="#006464"
    opacity="0.0"
  />
  <!-- The overlap is the shared triangle -->
  <polygon
    points="80,80  104,44  104,116"
    fill="#008080"
    opacity="0.85"
  />

  <!-- Small accent: horizontal line with arrows suggesting transaction flow -->
  <!-- Left arrow head -->
  <line x1="20" y1="80" x2="52" y2="80" stroke="#006464" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Right arrow -->
  <line x1="132" y1="80" x2="158" y2="80" stroke="#006464" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Arrow tips -->
  <polygon points="52,75 60,80 52,85" fill="#006464" opacity="0.5"/>
  <polygon points="132,75 124,80 132,85" fill="#006464" opacity="0.5"/>

  <!-- ══════════════════════════════════════════
       WORDMARK
       ══════════════════════════════════════════ -->

  <!-- "Ronak" — elegant serif, large, dark -->
  <text
    x="178"
    y="85"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-1"
    fill="#0A0A0A"
  >Ronak</text>

  <!-- "Ventures" — same serif but teal, slightly smaller and tracking -->
  <text
    x="178"
    y="122"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="30"
    font-weight="400"
    letter-spacing="8"
    fill="#006464"
  >Ventures</text>

  <!-- Thin decorative line separating wordmark from tagline -->
  <rect x="178" y="131" width="180" height="0.75" fill="#006464" opacity="0.4"/>

  <!-- Tagline — minimal, spaced -->
  <text
    x="179"
    y="146"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="3"
    fill="#6b6b6b"
  >M&amp;A TRANSACTION ADVISORY</text>
</svg>
