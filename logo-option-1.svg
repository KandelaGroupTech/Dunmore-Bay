<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap');
    </style>
    <!-- Teal-to-dark gradient for icon bg -->
    <linearGradient id="tealGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007a7a"/>
      <stop offset="100%" stop-color="#004a4a"/>
    </linearGradient>
    <!-- Subtle inner shadow effect -->
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#006464" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── Icon Mark ── -->
  <!-- Outer badge square -->
  <rect x="0" y="16" width="128" height="128" rx="12" fill="url(#tealGrad1)" filter="url(#shadow1)"/>

  <!-- Inner decorative border -->
  <rect x="8" y="24" width="112" height="112" rx="7" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Geometric R shape (white) -->
  <!-- R vertical stem -->
  <rect x="30" y="44" width="10" height="72" rx="2" fill="white"/>
  <!-- R top bowl horizontal -->
  <rect x="30" y="44" width="30" height="10" rx="2" fill="white"/>
  <!-- R bowl curve (right side) -->
  <rect x="56" y="44" width="10" height="8" rx="2" fill="white"/>
  <!-- R bowl middle connector -->
  <rect x="56" y="72" width="10" height="8" rx="2" fill="white"/>
  <!-- R bowl bottom horizontal -->
  <rect x="30" y="72" width="30" height="10" rx="2" fill="white"/>
  <!-- R leg diagonal -->
  <polygon points="40,82 50,82 72,116 60,116" fill="white" rx="2"/>

  <!-- Vertical divider between R and V -->
  <rect x="86" y="52" width="1.5" height="56" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Geometric V shape (teal-light / accent) -->
  <!-- V left arm -->
  <polygon points="93,44 103,44 101,116 91,116" fill="rgba(255,255,255,0.85)"/>
  <!-- V right arm -->
  <polygon points="115,44 125,44 103,116 93,116" fill="rgba(255,255,255,0.85)"/>

  <!-- Small teal accent dot at top right of icon -->
  <circle cx="116" cy="28" r="4" fill="rgba(255,255,255,0.4)"/>

  <!-- ── Wordmark ── -->
  <!-- Company name -->
  <text
    x="148"
    y="72"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="30"
    font-weight="bold"
    letter-spacing="4"
    fill="#0A0A0A"
  >RONAK</text>

  <!-- Thin rule between words -->
  <rect x="148" y="80" width="280" height="1" fill="#006464" opacity="0.5"/>

  <text
    x="148"
    y="106"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="30"
    font-weight="bold"
    letter-spacing="4"
    fill="#0A0A0A"
  >VENTURES</text>

  <!-- Tagline -->
  <text
    x="150"
    y="130"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="3.5"
    fill="#006464"
  >M&amp;A TRANSACTION ADVISORY</text>
</svg>
